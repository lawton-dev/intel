name: INTEL Daily Scraper

on:
  schedule:
    - cron: '0 11 * * 1-5'   # 6:00 AM CT weekdays
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 requests
          playwright install chromium
          playwright install-deps chromium

      - name: Run INTEL scraper
        run: python scripts/scrape.py

      - name: Commit updated lead data
        run: |
          git config user.name  "INTEL Bot"
          git config user.email "intel-bot@oneroofre.net"
          git add data/leads.json
          git diff --cached --quiet && echo "No changes" || \
          git commit -m "🤖 INTEL: Daily refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "### INTEL Scrape Complete" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import json
          d = json.load(open('data/leads.json'))
          print(f'Total leads: {d[\"totalLeads\"]}')
          for k,v in d['sources'].items():
              print(f'  {k}: {v}')
          print(f'Updated: {d[\"lastUpdated\"]}')
          " >> $GITHUB_STEP_SUMMARY
