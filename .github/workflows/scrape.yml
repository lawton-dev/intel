name: INTEL Daily Scraper

on:
  schedule:
    # 6:00 AM Central Time = 11:00 AM UTC (CST) / 12:00 PM UTC (CDT)
    # Runs every morning before your team starts working
    - cron: '0 11 * * 1-5'   # Weekdays only

  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # Needed to commit data/leads.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run INTEL scraper
        run: python scripts/scrape.py

      - name: Commit updated lead data
        run: |
          git config user.name  "INTEL Bot"
          git config user.email "intel-bot@oneroofre.net"
          git add data/leads.json
          git diff --cached --quiet && echo "No changes to commit" || \
          git commit -m "🤖 INTEL: Daily lead refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          if [ -f data/leads.json ]; then
            echo "### INTEL Scrape Complete" >> $GITHUB_STEP_SUMMARY
            echo "Total leads: $(python3 -c "import json; d=json.load(open('data/leads.json')); print(d['totalLeads'])")" >> $GITHUB_STEP_SUMMARY
            echo "Updated: $(python3 -c "import json; d=json.load(open('data/leads.json')); print(d['lastUpdated'])")" >> $GITHUB_STEP_SUMMARY
          fi
